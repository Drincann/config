theme = "onedark"

[editor]
line-number = "relative"
mouse = false
cursorline = true
color-modes = true
scrolloff = 5
rulers = [80, 120]
bufferline = "multiple"
true-color = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-type"]

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "│"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.insert]
j = { k = "normal_mode" }
